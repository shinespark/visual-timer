name: VisualBarTimer
options:
  bundleIdPrefix: com.shinespark
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true

targets:
  VisualBarTimer:
    type: application
    platform: macOS
    sources:
      - path: VisualBarTimer
        excludes:
          - "Resources/**"
    resources:
      - VisualBarTimer/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinespark.VisualBarTimer
        PRODUCT_NAME: Visual Bar Timer
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: VisualBarTimer/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      release:
        SWIFT_OPTIMIZATION_LEVEL: "-O"
