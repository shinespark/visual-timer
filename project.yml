name: VisualTimer
options:
  bundleIdPrefix: com.shinespark
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true

targets:
  VisualTimer:
    type: application
    platform: macOS
    sources:
      - path: VisualTimer
        excludes:
          - "Resources/**"
    resources:
      - VisualTimer/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinespark.VisualTimer
        PRODUCT_NAME: VisualTimer
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: VisualTimer/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      release:
        SWIFT_OPTIMIZATION_LEVEL: "-O"
